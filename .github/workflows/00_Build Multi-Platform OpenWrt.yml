#=================================================
# Description: Build Multi-Platform OpenWrt using GitHub Actions (Matrix)
# License: MIT
# Author: Reyanmatic
# Website: https://www.reyanmatic.com
#=================================================

name: 00_Build_OpenWrt_Matrix

permissions:
  contents: write
  actions: write

# 触发条件：
#   - workflow_dispatch    : 手动在 GitHub Actions 页面点击 "Run workflow"
#   - repository_dispatch  : 由 05_Update_Checker 检测到上游更新后自动触发
on:
  workflow_dispatch:
  repository_dispatch:
    types: [Build_OpenWrt_Matrix]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  TZ: Asia/Shanghai

jobs:
  build:
    # -------------------------------------------------------------------------
    # ⚠️【2026 兼容性说明 — 空间不足根因与修复】
    #
    # 现象：2026 年起 apt install 步骤报错
    #   "E: You don't have enough free space in /var/cache/apt/archives/"
    #
    # 根因：ubuntu-latest 在 2026 年初切换到了 ubuntu-24.04。
    #   与 22.04 相比，24.04 Runner 预装的开发工具更少，导致：
    #     - antlr3  → 拉入完整 OpenJDK 21（+依赖链）
    #     - asciidoc/texinfo → 拉入完整 texlive 套件（截图中 205-233 行的大量包）
    #   apt 所需空间从 ~200MB 暴增至 632MB 下载 + 1659MB 安装。
    #
    #   同时，maximize-build-space 会将根分区可用空间压缩至 root-reserve-mb（4096MB），
    #   此后再跑 apt，根分区剩余空间不足，触发上述报错。
    #
    # 修复方案（双管齐下）：
    #   1. 将 apt install 移到 maximize-build-space 之前（步骤 1），
    #      利用 Runner 初始状态根分区的完整可用空间完成安装。
    #   2. 全局加 --no-install-recommends，阻断 texlive/Java 等推荐包被批量拉入，
    #      将安装体积压回合理范围。
    # -------------------------------------------------------------------------
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ matrix.name || 'single' }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            config: x86_64.config
            diy_part: diy-part2.sh
            tag_prefix: x86
          - name: R2S
            config: R2S.config
            diy_part: diy-part3.sh
            tag_prefix: R2S
          # 预留新平台（如 R4S），补全 config 和 diy 脚本后取消注释即可
          # - name: R4S
          #   config: R4S.config
          #   diy_part: diy-part4.sh
          #   tag_prefix: R4S

    steps:
      # -----------------------------------------------------------------------
      # 步骤 1：初始化环境 & 安装依赖
      # 【必须是第一步】在 maximize-build-space 之前完成，
      # 利用 Runner 初始状态根分区的完整可用空间。
      # --no-install-recommends 防止 antlr3/asciidoc/texinfo 拉入 Java/texlive。
      # -----------------------------------------------------------------------
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install --no-install-recommends -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk \
            gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man \
            intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools \
            python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

      # 步骤 2：apt 完成后记录根分区状态（调试用）
      - name: Before freeing up disk space
        run: |
          echo "=============================================================================="
          echo "Disk usage after apt install, before maximize-build-space:"
          df -hT
          echo "=============================================================================="

      # 步骤 3：LVM 扩容，为编译目录腾出最大空间
      - name: Freeing up disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 步骤 4：扩容后空间检查
      - name: Free up disk space complete
        run: |
          echo "=============================================================================="
          echo "Disk usage after maximize-build-space:"
          df -hT
          echo "=============================================================================="

      # 步骤 5：拉取本仓库（获取 config/scripts 等）
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤 6：克隆上游 OpenWrt 源码
      - name: Clone source code
        run: |
          df -hT $PWD
          git clone ${REPO_URL} -b ${REPO_BRANCH} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      # 步骤 7：加载自定义 feeds
      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x diy-part1.sh
          cd openwrt
          $GITHUB_WORKSPACE/diy-part1.sh

      # 步骤 8：更新 feeds
      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      # 步骤 9：安装 feeds
      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      # -----------------------------------------------------------------------
      # 以下步骤进入矩阵并行（每个平台独立执行）
      # -----------------------------------------------------------------------

      # 步骤 10-1：平台配置 & 自定义脚本
      - name: Configuration & Customization
        run: |
          rm -rf openwrt/files
          [ -e files ] && cp -rf files openwrt/files
          cp ${{ matrix.config }} openwrt/.config
          chmod +x ${{ matrix.diy_part }}
          cd openwrt
          $GITHUB_WORKSPACE/${{ matrix.diy_part }}

      # 步骤 10-2：生成完整配置 & 下载依赖包
      - name: Make defconfig & Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      # 步骤 10-3：编译固件
      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          set -e
          echo ">>> CPU 核心数: $(nproc)，开始多核并发编译..."
          if ! make -j$(nproc); then
            echo "!!! 多核编译失败，切换单核..."
            if ! make -j1; then
              echo "!!! 单核也失败，输出详细日志..."
              make -j1 V=s
              echo "!!! 编译彻底失败，终止流程。"
              exit 1
            fi
          fi
          echo ">>> 编译成功"
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      # 步骤 10-4：编译后磁盘空间检查
      - name: Check space usage
        if: steps.compile.outputs.status == 'success'
        run: df -hT

      # 步骤 10-5：上传 bin 目录（可选，调试/归档）
      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: OpenWrt_bin_${{ matrix.name }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      # 步骤 10-6：整理固件文件（按平台保留所需格式）
      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          case "${{ matrix.name }}" in
            x86_64)
              # 只保留虚拟机镜像格式
              find . -type f ! \( -name '*.qcow2' -o -name '*.vmdk' -o -name '*.vdi' \) -delete
              ;;
            R2S)
              # 只保留 .gz 格式
              find . -type f ! -name '*.gz' -delete
              ;;
            # R4S)
            #   find . -type f ! -name '*.gz' -delete
            #   ;;
          esac
          echo "FIRMWARE_DIR=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      # 步骤 10-7：上传固件目录（artifact 归档）
      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && steps.organize.outputs.status == 'success'
        with:
          name: OpenWrt_firmware_${{ matrix.name }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE_DIR }}

      # 步骤 10-8：生成 Release 标签
      - name: Generate release tag
        id: tag
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "release_tag=${{ matrix.tag_prefix }}-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      # 步骤 10-9：上传固件到 GitHub Release
      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: steps.compile.outputs.status == 'success' && steps.tag.outputs.status == 'success'
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE_DIR }}/*

      # 步骤 10-10：清理历史 workflow 运行记录（保留最近 4 次）
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: steps.compile.outputs.status == 'success'
        continue-on-error: true
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 4
          delete_workflow_pattern: "00_Build_OpenWrt_Matrix"

      # 步骤 10-11：删除旧的 Releases（保留最新 4 次）
      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: steps.compile.outputs.status == 'success'
        continue-on-error: true
        with:
          keep_latest: 4
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}

#=================================================
# 扩展说明：
# - 新增平台：在 matrix.include 下添加 {name, config, diy_part, tag_prefix} 对象即可。
# - 固件格式：在 "Organize files" 的 case 语句中添加对应平台的文件过滤规则。
# - Feeds 差异：如需按平台分流，在相应步骤中用 if [ "${{ matrix.name }}" == "xxx" ] 判断。
#=================================================
