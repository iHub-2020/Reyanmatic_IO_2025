name: build-immortalwrt

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    # 仅保留手动触发
  repository_dispatch:
    types: [Build_OpenWrt_Immortalwrt]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ matrix.name || 'single' }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            config: x86_64.config
            diy_part: diy-part2.sh
            tag_prefix: x86
          - name: R2S
            config: R2S.config
            diy_part: diy-part3.sh
            tag_prefix: R2S

    steps:
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install --no-install-recommends -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk \
            gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man \
            intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools \
            python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

      - name: Freeing up disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone source code
        run: |
          REPO_URL="https://github.com/immortalwrt/immortalwrt"
          echo ">>> Using upstream: Immortalwrt ($REPO_URL)"
          git clone ${REPO_URL} -b ${REPO_BRANCH} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          UPSTREAM="Immortalwrt"
          [ -e ${UPSTREAM}/${FEEDS_CONF}] && cp ${UPSTREAM}/${FEEDS_CONF} openwrt/feeds.conf.default
          chmod +x ${UPSTREAM}/diy-part1.sh
          cd openwrt
          $GITHUB_WORKSPACE/${UPSTREAM}/diy-part1.sh

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Configuration & Customization
        run: |
          UPSTREAM="Immortalwrt"
          rm -rf openwrt/files
          [ -d ${UPSTREAM}/files ] && cp -rf ${UPSTREAM}/files openwrt/files
          cp ${UPSTREAM}/${{ matrix.config }} openwrt/.config
          chmod +x ${UPSTREAM}/${{ matrix.diy_part }}
          cd openwrt
          $GITHUB_WORKSPACE/${UPSTREAM}/${{ matrix.diy_part }}

      - name: Make defconfig & Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          set -e
          if ! make -j$(nproc); then
            if ! make -j1; then
              make -j1 V=s
              exit 1
            fi
          fi
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          case "${{ matrix.name }}" in
            x86_64)
              find . -type f ! \( -name '*.qcow2' -o -name '*.vmdk' -o -name '*.vdi' \) -delete
              ;;
            R2S)
              find . -type f ! -name '*.gz' -delete
              ;;
          esac
          echo "FIRMWARE_DIR=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && steps.organize.outputs.status == 'success'
        with:
          name: OpenWrt_firmware_Immortalwrt_${{ matrix.name }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE_DIR }}

      - name: Generate release tag
        id: tag
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "release_tag=Immortalwrt-${{ matrix.tag_prefix }}-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: steps.compile.outputs.status == 'success' && steps.tag.outputs.status == 'success'
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE_DIR }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: steps.compile.outputs.status == 'success'
        continue-on-error: true
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 4
          delete_workflow_pattern: "build-immortalwrt"

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: steps.compile.outputs.status == 'success'
        continue-on-error: true
        with:
          keep_latest: 4
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}